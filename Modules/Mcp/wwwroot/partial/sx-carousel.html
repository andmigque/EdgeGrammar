<div id="carouselExample" class="carousel slide carousel-fade mb-5">

    <!-- Indicators -->
    <div class="carousel-indicators" style="bottom: -2.5rem;">
        <button type="button" style="background-color: var(--bs-primary);"
                data-bs-target="#carouselExample"
                data-bs-slide-to="0"
                class="active"
                aria-current="true"
                aria-label="Slide 1"></button>
        <button type="button" style="background-color: var(--bs-primary);"
                data-bs-target="#carouselExample"
                data-bs-slide-to="1"
                aria-label="Slide 2"></button>
        <button type="button" style="background-color: var(--bs-primary);"
                data-bs-target="#carouselExample"
                data-bs-slide-to="2"
                aria-label="Slide 3"></button>
        <button type="button" style="background-color: var(--bs-primary);"
                data-bs-target="#carouselExample"
                data-bs-slide-to="3"
                aria-label="Slide 4"></button>
        <button type="button" style="background-color: var(--bs-primary);"
                data-bs-target="#carouselExample"
                data-bs-slide-to="4"
                aria-label="Slide 5"></button>
    </div>

    <!-- Slides -->
    <div class="carousel-inner" style="height: 480px; background: var(--bs-body-bg);">
        <div class="carousel-item active">
            <img src="/image/2-zero-trust-pillars-v2.png"
                 class="d-block w-100 h-100"
                 style="object-fit: contain;"
                 alt="Zero Trust Pillars">
        </div>
        <div class="carousel-item">
            <img src="/image/3-shared-responsibility-model.png"
                 class="d-block w-100 h-100"
                 style="object-fit: contain;"
                 alt="Shared Responsibility Model">
        </div>
        <div class="carousel-item">
            <img src="/image/4-confidentiality-integrity-availability.png"
                 class="d-block w-100 h-100"
                 style="object-fit: contain;"
                 alt="CIA Triad">
        </div>
        <div class="carousel-item">
            <img src="/image/4-defense-depth.png"
                 class="d-block w-100 h-100"
                 style="object-fit: contain;"
                 alt="Defense in Depth">
        </div>
        <div class="carousel-item">
            <img src="/image/grc-framework-v3-inline.png"
                 class="d-block w-100 h-100"
                 style="object-fit: contain;"
                 alt="GRC Framework">
        </div>
    </div>

    <!-- Arrows -->
    <button class="carousel-control-prev" type="button"
            data-bs-target="#carouselExample"
            data-bs-slide="prev">
        <span class="carousel-control-prev-icon"
              style="width: 3rem; height: 3rem; filter: drop-shadow(0 0 4px #000);"
              aria-hidden="true"></span>
        <span class="visually-hidden">Previous</span>
    </button>
    <button class="carousel-control-next" type="button"
            data-bs-target="#carouselExample"
            data-bs-slide="next">
        <span class="carousel-control-next-icon"
              style="width: 3rem; height: 3rem; filter: drop-shadow(0 0 4px #000);"
              aria-hidden="true"></span>
        <span class="visually-hidden">Next</span>
    </button>

</div>

<script>
    var el = document.getElementById('carouselExample');
    var carousel = new bootstrap.Carousel(el, { interval: 3000, ride: 'carousel' });
    carousel.cycle();
</script>
