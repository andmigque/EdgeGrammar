<!--
  Placeholders — How It Works
  ============================================================
  Create placeholders with .placeholder + a grid column class
  (e.g. .col-6) to control width. They can replace text inside
  an element or be added as a modifier to an existing component.

  .btn placeholders use ::before to maintain height. Add &nbsp;
  inside any other element to preserve its height too.

  aria-hidden="true" hides the placeholder from screen readers.
  Use JavaScript to swap placeholder state and notify AT users
  when real content loads.
  ============================================================
-->

<!-- Basic Usage -->
<h6 class="text-muted mt-2 mb-2">Basic Usage</h6>
<p aria-hidden="true">
  <span class="placeholder col-6"></span>
</p>
<a class="btn btn-primary disabled placeholder col-4 mb-4"
   aria-disabled="true"></a>

<!-- Width Control -->
<h6 class="text-muted mb-2">Width Control</h6>
<div class="mb-4">
  <span class="placeholder col-6 d-block mb-1"></span>
  <span class="placeholder w-75 d-block mb-1"></span>
  <span class="placeholder d-block" style="width: 25%;"></span>
</div>

<!-- Color Variants -->
<h6 class="text-muted mb-2">Color Variants</h6>
<div class="mb-4">
  <span class="placeholder col-12 d-block mb-1"></span>
  <span class="placeholder col-12 bg-primary d-block mb-1"></span>
  <span class="placeholder col-12 bg-secondary d-block mb-1"></span>
  <span class="placeholder col-12 bg-success d-block mb-1"></span>
  <span class="placeholder col-12 bg-danger d-block mb-1"></span>
  <span class="placeholder col-12 bg-warning d-block mb-1"></span>
  <span class="placeholder col-12 bg-info d-block mb-1"></span>
  <span class="placeholder col-12 bg-light d-block mb-1"></span>
  <span class="placeholder col-12 bg-dark d-block"></span>
</div>

<!-- Sizing -->
<h6 class="text-muted mb-2">Sizing</h6>
<div class="mb-4">
  <span class="placeholder col-12 placeholder-lg d-block mb-1"></span>
  <span class="placeholder col-12 d-block mb-1"></span>
  <span class="placeholder col-12 placeholder-sm d-block mb-1"></span>
  <span class="placeholder col-12 placeholder-xs d-block"></span>
</div>

<!-- Animation: Glow vs Wave -->
<h6 class="text-muted mb-2">Animation — Glow vs Wave</h6>
<p class="placeholder-glow">
  <span class="placeholder col-12"></span>
</p>
<p class="placeholder-wave">
  <span class="placeholder col-12"></span>
</p>

<!-- Card Skeleton Example -->
<h6 class="text-muted mb-2">Card Skeleton</h6>
<div class="card" style="width: 18rem;" aria-hidden="true">
  <div class="card-body">
    <h5 class="card-title placeholder-glow">
      <span class="placeholder col-6"></span>
    </h5>
    <p class="card-text placeholder-glow">
      <span class="placeholder col-7"></span>
      <span class="placeholder col-4"></span>
      <span class="placeholder col-4"></span>
      <span class="placeholder col-6"></span>
      <span class="placeholder col-8"></span>
    </p>
    <a class="btn btn-primary disabled placeholder col-6"
       aria-disabled="true"></a>
  </div>
</div>
