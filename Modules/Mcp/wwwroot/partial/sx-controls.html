<!-- Buttons -->
<h6 class="text-muted mt-2 mb-2">Buttons</h6>
<button type="button" class="btn btn-primary">🥇 Primary</button>
<button type="button" class="btn btn-secondary">🥈 Secondary</button>
<button type="button" class="btn btn-success">✅ Success</button>
<button type="button" class="btn btn-danger">💥 Danger</button>
<button type="button" class="btn btn-warning">⚠️ Warning</button>
<button type="button" class="btn btn-info">💡 Info</button>
<button type="button" class="btn btn-light">☀️ Light</button>
<button type="button" class="btn btn-dark">🌑 Dark</button>
<button type="button" class="btn btn-link">🔗 Link</button>
<button type="button" class="btn btn-outline-secondary" id="toastBtn">🔔 Toast</button>

<div class="toast-container position-fixed top-0 start-0 p-3">
    <div id="liveToast"
         class="toast"
         style="min-width: 350px;"
         role="alert"
         aria-live="assertive"
         aria-atomic="true">
        <div class="toast-header">
            <strong class="me-auto">Bootstrap</strong>
            <small>11 mins ago</small>
            <button type="button" class="btn-close"
                    data-bs-dismiss="toast"
                    aria-label="Close"></button>
        </div>
        <div class="toast-body">
            Hello, world! This is a toast message.
        </div>
    </div>
</div>

<script>
    document.getElementById('toastBtn').addEventListener('click', function () {
        var toast = bootstrap.Toast.getOrCreateInstance(
            document.getElementById('liveToast')
        );
        toast.show();
    });
</script>

<!-- Button Group -->
<h6 class="text-muted mt-4 mb-2">Button Group</h6>
<div class="btn-group" role="group" aria-label="Basic example">
    <button type="button" class="btn btn-primary">Left</button>
    <button type="button" class="btn btn-primary">Middle</button>
    <button type="button" class="btn btn-primary">Right</button>
</div>
