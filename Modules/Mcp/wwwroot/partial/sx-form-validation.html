<!--
  Form Validation — How It Works
  ============================================================
  - Uses CSS :invalid / :valid pseudo-classes on input,
    select, and textarea elements.
  - .was-validated on the <form> scopes validation styles
    so invalid states don't appear on page load.
  - novalidate disables browser default feedback bubbles
    so Bootstrap's custom feedback shows instead.
  - .is-invalid / .is-valid work without .was-validated
    for server-side validation scenarios.
  - .valid-feedback / .invalid-feedback divs hold the
    custom feedback messages.
  - .has-validation on input-group fixes border-radius
    when an input group contains a feedback div.
  - Submit triggers form.checkValidity(); if false,
    preventDefault + stopPropagation, then add
    .was-validated to reveal all feedback states.
  ============================================================
-->

<form class="row g-3 needs-validation mt-2" novalidate>

  <div class="col-md-4">
    <label for="valFirst" class="form-label">First name</label>
    <input type="text"
           class="form-control"
           id="valFirst"
           value="Mark"
           required>
    <div class="valid-feedback">Looks good!</div>
  </div>

  <div class="col-md-4">
    <label for="valLast" class="form-label">Last name</label>
    <input type="text"
           class="form-control"
           id="valLast"
           value="Otto"
           required>
    <div class="valid-feedback">Looks good!</div>
  </div>

  <div class="col-md-4">
    <label for="valUsername" class="form-label">Username</label>
    <div class="input-group has-validation">
      <span class="input-group-text"
            id="valUsernamePrepend">@</span>
      <input type="text"
             class="form-control"
             id="valUsername"
             aria-describedby="valUsernamePrepend"
             required>
      <div class="invalid-feedback">
        Please choose a username.
      </div>
    </div>
  </div>

  <div class="col-md-6">
    <label for="valCity" class="form-label">City</label>
    <input type="text"
           class="form-control"
           id="valCity"
           required>
    <div class="invalid-feedback">
      Please provide a valid city.
    </div>
  </div>

  <div class="col-md-3">
    <label for="valState" class="form-label">State</label>
    <select class="form-select" id="valState" required>
      <option selected disabled value="">Choose...</option>
      <option>Ohio</option>
      <option>Kentucky</option>
      <option>Indiana</option>
    </select>
    <div class="invalid-feedback">
      Please select a valid state.
    </div>
  </div>

  <div class="col-md-3">
    <label for="valZip" class="form-label">Zip</label>
    <input type="text"
           class="form-control"
           id="valZip"
           required>
    <div class="invalid-feedback">
      Please provide a valid zip.
    </div>
  </div>

  <div class="col-12">
    <div class="form-check">
      <input class="form-check-input"
             type="checkbox"
             id="valTerms"
             required>
      <label class="form-check-label" for="valTerms">
        Agree to terms and conditions
      </label>
      <div class="invalid-feedback">
        You must agree before submitting.
      </div>
    </div>
  </div>

  <div class="col-12">
    <button class="btn btn-primary" type="submit">
      Submit form
    </button>
  </div>

</form>

<script>
  (() => {
    'use strict';
    document.querySelectorAll('.needs-validation')
      .forEach(form => {
        form.addEventListener('submit', e => {
          if (!form.checkValidity()) {
            e.preventDefault();
            e.stopPropagation();
          }
          form.classList.add('was-validated');
        }, false);
      });
  })();
</script>
