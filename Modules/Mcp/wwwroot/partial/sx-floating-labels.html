<!--
  Floating Labels — How It Works
  ============================================================
  - Wrap <input class="form-control"> and <label> inside
    a <div class="form-floating"> container.
  - A non-empty placeholder attribute is REQUIRED on every
    input. The CSS uses :placeholder-shown to detect when
    the input is empty and float the label accordingly.
  - The <input> must come BEFORE the <label> in the DOM —
    Bootstrap's CSS uses a sibling selector (~) to target
    the label from the input state.
  - When a value is already set, the label auto-adjusts
    to its floated position immediately.
  - Works with: text inputs, password, email, textarea,
    select, input-group, and grid layouts.
  ============================================================
-->

<!-- Basic — email + password -->
<h6 class="text-muted mt-2 mb-2">Basic</h6>
<div class="form-floating mb-3">
  <input type="email"
         class="form-control"
         id="floatEmail"
         placeholder="name@example.com">
  <label for="floatEmail">Email address</label>
</div>
<div class="form-floating mb-4">
  <input type="password"
         class="form-control"
         id="floatPassword"
         placeholder="Password">
  <label for="floatPassword">Password</label>
</div>

<!-- Pre-filled value -->
<h6 class="text-muted mb-2">Pre-filled Value</h6>
<div class="form-floating mb-4">
  <input type="email"
         class="form-control"
         id="floatPrefilled"
         placeholder="name@example.com"
         value="test@example.com">
  <label for="floatPrefilled">Input with value</label>
</div>

<!-- Validation states -->
<h6 class="text-muted mb-2">Validation States</h6>
<div class="form-floating mb-2">
  <input type="email"
         class="form-control is-valid"
         id="floatValid"
         placeholder="name@example.com"
         value="valid@example.com">
  <label for="floatValid">Valid input</label>
</div>
<div class="form-floating mb-4">
  <input type="email"
         class="form-control is-invalid"
         id="floatInvalid"
         placeholder="name@example.com"
         value="notvalid">
  <label for="floatInvalid">Invalid input</label>
</div>

<!-- Textarea -->
<h6 class="text-muted mb-2">Textarea</h6>
<div class="form-floating mb-2">
  <textarea class="form-control"
            placeholder="Leave a comment here"
            id="floatTextarea"></textarea>
  <label for="floatTextarea">Comments (default height)</label>
</div>
<div class="form-floating mb-4">
  <textarea class="form-control"
            placeholder="Leave a comment here"
            id="floatTextareaCustom"
            style="height: 100px"></textarea>
  <label for="floatTextareaCustom">Comments (100px height)</label>
</div>

<!-- Select -->
<h6 class="text-muted mb-2">Select</h6>
<div class="form-floating mb-4">
  <select class="form-select"
          id="floatSelect"
          aria-label="Floating label select">
    <option selected>Open this select menu</option>
    <option value="1">One</option>
    <option value="2">Two</option>
    <option value="3">Three</option>
  </select>
  <label for="floatSelect">Works with selects</label>
</div>

<!-- Disabled -->
<h6 class="text-muted mb-2">Disabled</h6>
<div class="form-floating mb-4">
  <input type="email"
         class="form-control"
         id="floatDisabled"
         placeholder="name@example.com"
         disabled>
  <label for="floatDisabled">Email address (disabled)</label>
</div>

<!-- Input Group + Floating Label -->
<h6 class="text-muted mb-2">Input Group</h6>
<div class="input-group mb-2">
  <span class="input-group-text">@</span>
  <div class="form-floating">
    <input type="text"
           class="form-control"
           id="floatGroupUser"
           placeholder="Username">
    <label for="floatGroupUser">Username</label>
  </div>
</div>
<div class="input-group has-validation mb-4">
  <span class="input-group-text">@</span>
  <div class="form-floating is-invalid">
    <input type="text"
           class="form-control is-invalid"
           id="floatGroupInvalid"
           placeholder="Username"
           required>
    <label for="floatGroupInvalid">Username</label>
  </div>
  <div class="invalid-feedback">Please choose a username.</div>
</div>

<!-- Grid Layout -->
<h6 class="text-muted mb-2">Grid Layout</h6>
<div class="row g-2">
  <div class="col-md">
    <div class="form-floating">
      <input type="email"
             class="form-control"
             id="floatGridEmail"
             placeholder="name@example.com"
             value="mdo@example.com">
      <label for="floatGridEmail">Email address</label>
    </div>
  </div>
  <div class="col-md">
    <div class="form-floating">
      <select class="form-select" id="floatGridSelect">
        <option selected>Open this select menu</option>
        <option value="1">One</option>
        <option value="2">Two</option>
        <option value="3">Three</option>
      </select>
      <label for="floatGridSelect">Works with selects</label>
    </div>
  </div>
</div>
